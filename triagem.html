<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triagem Psicológica — Pedro Duarte, Psicólogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf9f7; --surface: #ffffff; --surface2: #f3f2ef;
  --text: #1a1917; --text-muted: #6b6a67; --text-hint: #9b9a97;
  --border: rgba(26,25,23,0.11); --border-mid: rgba(26,25,23,0.22);
  --accent: #1a1917;
  --green: #3B6D11; --green-bg: #EAF3DE; --green-border: #C0DD97;
  --amber: #854F0B; --amber-bg: #FAEEDA; --amber-border: #FAC775;
  --red: #A32D2D; --red-bg: #FCEBEB; --red-border: #F7C1C1;
  --blue-bg: #E6F1FB; --blue-text: #042C53; --blue-border: #B5D4F4;
  --teal-bg: #E1F5EE; --teal-text: #085041; --teal-border: #9FE1CB;
  --purple-bg: #EEEDFE; --purple-text: #26215C; --purple-border: #AFA9EC;
  --radius: 10px; --radius-lg: 14px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110; --surface: #1c1c1a; --surface2: #252523;
    --text: #f0ede8; --text-muted: #9b9a97; --text-hint: #6b6a67;
    --border: rgba(240,237,232,0.1); --border-mid: rgba(240,237,232,0.2);
    --accent: #f0ede8;
    --green: #97C459; --green-bg: #173404; --green-border: #3B6D11;
    --amber: #EF9F27; --amber-bg: #412402; --amber-border: #854F0B;
    --red: #E24B4A; --red-bg: #501313; --red-border: #A32D2D;
    --blue-bg: #042C53; --blue-text: #B5D4F4; --blue-border: #185FA5;
    --teal-bg: #04342C; --teal-text: #9FE1CB; --teal-border: #0F6E56;
    --purple-bg: #26215C; --purple-text: #CECBF6; --purple-border: #534AB7;
  }
}

html { font-size: 16px; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 2rem 1rem 5rem;
}
.container { width: 100%; max-width: 720px; }

.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-hint); text-decoration: none;
  margin-bottom: 1.5rem; transition: color 0.15s;
}
.back-link:hover { color: var(--text-muted); }

.site-header { text-align: center; margin-bottom: 2.5rem; }
.site-header .eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 10px; }
.site-header h1 { font-family: 'Lora', serif; font-size: 26px; font-weight: 400; line-height: 1.3; margin-bottom: 8px; }
.site-header p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }

/* Progress */
.progress-wrap { margin-bottom: 1.5rem; }
.progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-hint); margin-bottom: 7px; }
.progress-track { height: 2px; background: var(--border); border-radius: 2px; }
.progress-fill { height: 2px; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

/* Cards */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 2rem;
  animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  margin-bottom: 1rem;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.section-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 1.25rem; padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.section-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; flex-shrink: 0; color: var(--text-muted);
}
.section-title { font-family: 'Lora', serif; font-size: 17px; font-weight: 400; }
.section-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* Form fields */
.field { margin-bottom: 1.25rem; }
.field label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.field input[type="text"],
.field input[type="date"],
.field select,
.field textarea {
  width: 100%; padding: 10px 13px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--border-mid);
}
.field textarea { min-height: 80px; resize: vertical; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* Scale items */
.scale-item {
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 8px;
  transition: border-color 0.15s;
}
.scale-item:hover { border-color: var(--border-mid); }
.scale-q { font-size: 13.5px; color: var(--text); margin-bottom: 10px; line-height: 1.5; }
.scale-q small { display: block; font-size: 11.5px; color: var(--text-hint); margin-top: 2px; }
.scale-opts { display: flex; gap: 6px; flex-wrap: wrap; }
.scale-opt {
  flex: 1; min-width: 60px;
  padding: 7px 8px;
  border: 1px solid var(--border); border-radius: 7px;
  background: var(--surface); cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  color: var(--text-muted); text-align: center;
  transition: all 0.15s; line-height: 1.3;
}
.scale-opt:hover { border-color: var(--border-mid); background: var(--surface2); color: var(--text); }
.scale-opt.sel { border-color: var(--accent); background: var(--accent); color: var(--bg); }
.scale-intro { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.6; font-style: italic; }

/* Checkbox group */
.check-group { display: flex; flex-direction: column; gap: 7px; }
.check-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 13px; border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
}
.check-item:hover { border-color: var(--border-mid); background: var(--surface2); }
.check-item input { margin-top: 2px; flex-shrink: 0; }
.check-item span { font-size: 13.5px; line-height: 1.5; }

/* Radio group */
.radio-group { display: flex; flex-direction: column; gap: 7px; }
.radio-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 13px; border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
}
.radio-item:hover { border-color: var(--border-mid); background: var(--surface2); }
.radio-item input { flex-shrink: 0; }
.radio-item span { font-size: 13.5px; }

/* Nav */
.nav { display: flex; gap: 8px; align-items: center; margin-top: 1.5rem; }
.btn {
  padding: 10px 20px; border-radius: var(--radius);
  border: 1px solid var(--border-mid); background: transparent;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; cursor: pointer; transition: background 0.15s, transform 0.1s;
  text-decoration: none; display: inline-flex; align-items: center;
}
.btn:hover { background: var(--surface2); }
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); margin-left: auto; }
.btn.primary:hover { opacity: 0.85; background: var(--accent); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Score boxes */
.score-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 1.25rem 0; }
.score-box {
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; text-align: center;
}
.score-box .label { font-size: 11px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.score-box .value { font-size: 26px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
.score-box .sev { font-size: 12px; color: var(--text-muted); }
.score-green .value { color: var(--green); }
.score-amber .value { color: var(--amber); }
.score-red .value { color: var(--red); }

/* Step level */
.step-badge {
  border-radius: var(--radius-lg); padding: 1.5rem;
  text-align: center; margin: 1.25rem 0;
}
.step-badge .step-num { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.step-badge .step-title { font-family: 'Lora', serif; font-size: 20px; font-weight: 400; margin-bottom: 6px; }
.step-badge .step-desc { font-size: 13px; line-height: 1.6; }
.step-1 { background: var(--green-bg); border: 1px solid var(--green-border); }
.step-1 .step-num { color: var(--green); }
.step-1 .step-title { color: var(--green); }
.step-1 .step-desc { color: var(--text-muted); }
.step-2 { background: var(--amber-bg); border: 1px solid var(--amber-border); }
.step-2 .step-num { color: var(--amber); }
.step-2 .step-title { color: var(--amber); }
.step-2 .step-desc { color: var(--text-muted); }
.step-3 { background: var(--red-bg); border: 1px solid var(--red-border); }
.step-3 .step-num { color: var(--red); }
.step-3 .step-title { color: var(--red); }
.step-3 .step-desc { color: var(--text-muted); }

/* Info box */
.info-box { border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 16px; margin-bottom: 10px; }
.info-box h4 { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
.info-box p, .info-box ul { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
.info-box ul { padding-left: 1.2rem; }
.info-box ul li { margin-bottom: 3px; }

.flags-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.flag-tag {
  font-size: 11.5px; padding: 4px 10px; border-radius: 6px;
  background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border);
}

.disclaimer {
  font-size: 11.5px; color: var(--text-hint);
  border-top: 1px solid var(--border); padding-top: 1.25rem;
  margin-top: 1.5rem; line-height: 1.7; font-style: italic; text-align: center;
}

.section-intro {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 15px; margin-bottom: 1.25rem;
  font-size: 13px; color: var(--text-muted); line-height: 1.6;
}

.trauma-gate {
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 1rem;
}
.trauma-gate p { font-size: 13.5px; margin-bottom: 10px; line-height: 1.5; }

@media (max-width: 540px) {
  .card { padding: 1.5rem 1.25rem; }
  .field-row, .field-row3 { grid-template-columns: 1fr; }
  .score-grid { grid-template-columns: 1fr; }
  .scale-opts { flex-direction: column; }
  .scale-opt { text-align: left; min-width: unset; flex: unset; width: 100%; }
}
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← Voltar</a>

  <header class="site-header">
    <p class="eyebrow">Pedro Duarte · Psicólogo · Avaliação Clínica</p>
    <h1>Ficha de Triagem Psicológica</h1>
    <p>Modelo <em>Stepped Care</em> — Avaliação padronizada para orientação do nível de cuidado</p>
  </header>

  <div class="progress-wrap" id="prog-wrap">
    <div class="progress-meta"><span id="prog-sec"></span><span id="prog-ct"></span></div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="app"></div>
</div>

<script>
// ── State
const state = {
  page: 0,
  ident: {},
  motivo: {},
  hist: {},
  phq9: new Array(9).fill(null),
  gad7: new Array(7).fill(null),
  trauma: false,
  pcl5: new Array(20).fill(null),
  risco: {},
  obs: {}
};

const PAGES = ['intro','ident','motivo','hist','phq9','gad7','trauma_gate','pcl5','risco','resultado'];
const TOTAL = PAGES.length;

// ── Labels
const PHQ9_Q = [
  "Pouco interesse ou prazer em fazer as coisas?",
  "Sentir-se deprimido(a), sem esperança ou vazio(a)?",
  "Dificuldade em adormecer, manter o sono ou dormir demais?",
  "Sentir-se cansado(a) ou com pouca energia?",
  "Apetite diminuído ou aumentado?",
  "Sentir-se mal consigo mesmo(a) — ou que é um fracasso ou que dececionou a família?",
  "Dificuldade em concentrar-se nas coisas, como ler o jornal ou ver televisão?",
  "Mover-se ou falar tão devagar que outras pessoas poderam notar? Ou o oposto — ficar tão agitado(a) que se move mais do que o habitual?",
  "Pensamentos de que seria melhor estar morto(a) ou de se magoar de alguma forma?"
];
const GAD7_Q = [
  "Sentir-se nervoso(a), ansioso(a) ou em alerta?",
  "Não conseguir parar ou controlar as preocupações?",
  "Preocupar-se demasiado com coisas diferentes?",
  "Dificuldade em relaxar?",
  "Ficar tão agitado(a) que é difícil ficar quieto(a)?",
  "Ficar facilmente irritado(a) ou irritável?",
  "Sentir medo como se algo terrível pudesse acontecer?"
];
const PCL5_Q = [
  "Memórias repetidas, perturbadoras e indesejadas da experiência stressante?",
  "Sonhos repetidos e perturbadores com a experiência stressante?",
  "De repente sentir ou agir como se a experiência stressante estivesse de facto a acontecer novamente?",
  "Sentir-se muito perturbado(a) quando algo lhe faz lembrar a experiência stressante?",
  "Ter reações físicas intensas quando algo lhe faz lembrar a experiência stressante (ex: coração acelerado, dificuldade em respirar, suores)?",
  "Evitar memórias, pensamentos ou sentimentos relacionados com a experiência stressante?",
  "Evitar recordações externas da experiência stressante (ex: pessoas, lugares, conversas, atividades, objetos ou situações)?",
  "Dificuldade em recordar partes importantes da experiência stressante?",
  "Ter crenças negativas fortes sobre si mesmo(a), outras pessoas ou o mundo?",
  "Culpar-se a si próprio(a) ou a outros pela experiência stressante ou pelo que aconteceu depois?",
  "Ter sentimentos negativos intensos como medo, horror, raiva, culpa ou vergonha?",
  "Perda de interesse em atividades que costumava gostar?",
  "Sentir-se distante ou afastado(a) das outras pessoas?",
  "Dificuldade em experienciar sentimentos positivos (ex: incapaz de sentir alegria ou sentimentos de amor)?",
  "Comportamento irritável, crises de raiva ou agir de forma agressiva?",
  "Correr demasiados riscos ou fazer coisas que lhe podem causar dano?",
  "Estar em estado de 'alerta máximo', vigilante ou em guarda?",
  "Sentir-se facilmente assustado(a)?",
  "Dificuldade de concentração?",
  "Dificuldade em adormecer ou manter o sono?"
];
const FREQ_OPTS = [
  {v:0, l:"Nunca"},
  {v:1, l:"Vários dias"},
  {v:2, l:"Mais de\nmetade dos dias"},
  {v:3, l:"Quase\ntodos os dias"}
];
const PCL_OPTS = [
  {v:0, l:"Nada"},
  {v:1, l:"Um pouco"},
  {v:2, l:"Moderadamente"},
  {v:3, l:"Bastante"},
  {v:4, l:"Extremamente"}
];

// ── Scoring
function phqScore()  { return state.phq9.reduce((s,v) => s + (v||0), 0); }
function gad7Score() { return state.gad7.reduce((s,v) => s + (v||0), 0); }
function pcl5Score() { return state.pcl5.reduce((s,v) => s + (v||0), 0); }

function phqSev(s) {
  if (s <= 4)  return {l:"Sem indicação clínica", cls:"green"};
  if (s <= 9)  return {l:"Leve",                  cls:"green"};
  if (s <= 14) return {l:"Moderada",              cls:"amber"};
  if (s <= 19) return {l:"Moderada-severa",       cls:"amber"};
  return               {l:"Severa",               cls:"red"};
}
function gadSev(s) {
  if (s <= 4)  return {l:"Sem indicação clínica", cls:"green"};
  if (s <= 9)  return {l:"Leve",                  cls:"green"};
  if (s <= 14) return {l:"Moderada",              cls:"amber"};
  return               {l:"Severa",               cls:"red"};
}
function pclSev(s) {
  if (s < 31)  return {l:"Abaixo do limiar clínico", cls:"green"};
  if (s <= 50) return {l:"Provável PTSD",             cls:"amber"};
  return               {l:"PTSD severa provável",    cls:"red"};
}

function calcStep() {
  const phq = phqScore(), gad = gad7Score(), pcl = state.trauma ? pcl5Score() : 0;
  const risco9 = (state.phq9[8] || 0) >= 2;
  const risc = state.risco;
  const flagUrgent = risc.ideacao === 'sim' || risc.risco_vida === 'sim' || risco9;
  const flagHigh = phq >= 15 || gad >= 15 || (state.trauma && pcl >= 33) ||
                   risc.prev_internamento === 'sim' || risc.consumos_ativos === 'sim';
  const flagMed = phq >= 10 || gad >= 10 || (state.trauma && pcl >= 28);

  if (flagUrgent) return 3;
  if (flagHigh) return 3;
  if (flagMed) return 2;
  return 1;
}

function getFlags() {
  const flags = [];
  const phq = phqScore(), gad = gad7Score();
  if ((state.phq9[8]||0) >= 2) flags.push("Item 9 PHQ-9 positivo (risco de autolesão)");
  if (phq >= 20) flags.push("PHQ-9 severo (≥20)");
  if (gad >= 15) flags.push("GAD-7 severo (≥15)");
  if (state.trauma && pcl5Score() >= 33) flags.push("PCL-5 acima do limiar clínico (≥31)");
  if (state.risco.ideacao === 'sim') flags.push("Ideação suicida reportada");
  if (state.risco.risco_vida === 'sim') flags.push("Risco imediato para a vida");
  if (state.risco.prev_internamento === 'sim') flags.push("Histórico de internamento psiquiátrico");
  if (state.risco.consumos_ativos === 'sim') flags.push("Consumos ativos de substâncias");
  return flags;
}

// ── Render
function render() {
  const app = document.getElementById('app');
  const pw  = document.getElementById('prog-wrap');
  const p = PAGES[state.page];
  const pct = (state.page / (TOTAL-1) * 100).toFixed(0);
  const secLabels = {
    intro:"Introdução", ident:"Identificação", motivo:"Motivo da consulta",
    hist:"História clínica", phq9:"PHQ-9 · Depressão", gad7:"GAD-7 · Ansiedade",
    trauma_gate:"Rastreio de Trauma", pcl5:"PCL-5 · PTSD", risco:"Avaliação de Risco",
    resultado:"Resultado"
  };
  pw.style.display = p === 'intro' ? 'none' : 'block';
  document.getElementById('prog-sec').textContent = secLabels[p] || '';
  document.getElementById('prog-ct').textContent  = p !== 'intro' && p !== 'resultado'
    ? (state.page) + ' / ' + (TOTAL-2) : '';
  document.getElementById('prog-fill').style.width = pct + '%';

  const fns = {
    intro: renderIntro, ident: renderIdent, motivo: renderMotivo,
    hist: renderHist, phq9: renderPHQ9, gad7: renderGAD7,
    trauma_gate: renderTraumaGate, pcl5: renderPCL5,
    risco: renderRisco, resultado: renderResultado
  };
  (fns[p] || renderIntro)(app);
}

function nav(dir) {
  const p = PAGES[state.page];
  if (dir > 0) {
    // skip PCL5 if no trauma
    if (p === 'trauma_gate' && !state.trauma) {
      state.page += 2;
    } else {
      state.page++;
    }
  } else {
    if (p === 'pcl5') { state.page -= 2; }
    else { state.page = Math.max(0, state.page - 1); }
  }
  window.scrollTo(0,0);
  render();
}

function setField(obj, key, val) { obj[key] = val; render(); }
function setScale(arr, idx, val) { arr[idx] = val; render(); }

// ── Intro
function renderIntro(app) {
  app.innerHTML = `
  <div class="card">
    <div class="section-intro" style="margin-bottom:1.5rem">
      <strong>Instrução ao clínico:</strong> Esta ficha de triagem segue o modelo <em>Stepped Care</em>
      e integra os instrumentos PHQ-9 (depressão), GAD-7 (ansiedade) e PCL-5 (trauma). O resultado
      orienta o nível de intervenção recomendado (Nível 1, 2 ou 3).
    </div>
    <div style="text-align:center;padding:.5rem 0 1rem">
      <div style="font-size:14px;color:var(--text-muted);line-height:1.75;max-width:480px;margin:0 auto 1.5rem">
        Esta ficha é preenchida com o utente na primeira consulta de avaliação psicológica.
        Os dados são confidenciais e utilizados exclusivamente para fins clínicos.
      </div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:1.75rem">
        <span style="font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--blue-border);background:var(--blue-bg);color:var(--blue-text)">PHQ-9</span>

        <div class="section-title">Resultado da Triagem</div>
        <div class="section-subtitle">${nome} · ${data}</div>
      </div>
    </div>

    <div class="score-grid">
      <div class="score-box score-${ps.cls}">
        <div class="label">PHQ-9 · Depressão</div>
        <div class="value">${phq}</div>
        <div class="sev">${ps.l}</div>
      </div>
      <div class="score-box score-${gs.cls}">
        <div class="label">GAD-7 · Ansiedade</div>
        <div class="value">${gad}</div>
        <div class="sev">${gs.l}</div>
      </div>
      ${state.trauma ? `
      <div class="score-box score-${cs.cls}">
        <div class="label">PCL-5 · PTSD</div>
        <div class="value">${pcl}</div>
        <div class="sev">${cs.l}</div>
      </div>` : `
      <div class="score-box">
        <div class="label">PCL-5 · PTSD</div>
        <div class="value" style="font-size:16px;color:var(--text-hint)">N/A</div>
        <div class="sev">Não aplicado</div>
      </div>`}
    </div>

    <div class="step-badge ${si.cls}">
      <div class="step-num">Nível de Cuidado Recomendado</div>
      <div class="step-title">${si.label}</div>
      <div class="step-desc">${si.desc}</div>
    </div>

    ${flags.length > 0 ? `
    <div class="info-box" style="background:var(--red-bg);border-color:var(--red-border)">
      <h4 style="color:var(--red)">⚠️ Alertas clínicos identificados</h4>
      <div class="flags-list">${flags.map(f=>`<span class="flag-tag">${f}</span>`).join('')}</div>
    </div>` : ''}

    <div class="info-box">
      <h4>Recomendações clínicas — Nível ${step}</h4>
      <ul>${si.rec.map(r=>`<li>${r}</li>`).join('')}</ul>
    </div>

    ${state.motivo.queixa ? `
    <div class="info-box">
      <h4>Queixa principal (palavras do utente)</h4>
      <p>${state.motivo.queixa}</p>
    </div>` : ''}

    ${state.obs.notas ? `
    <div class="info-box">
      <h4>Notas clínicas</h4>
      <p>${state.obs.notas}</p>
    </div>` : ''}

    <div class="info-box">
      <h4>Resumo dos instrumentos aplicados</h4>
      <p>PHQ-9: ${phq}/27 (${ps.l}) · GAD-7: ${gad}/21 (${gs.l})${state.trauma?` · PCL-5: ${pcl}/80 (${cs.l})':''}</p>
    </div>

    <div style="display:flex;justify-content:center;gap:8px;margin-top:1.25rem;flex-wrap:wrap">
      <button class="btn" onclick="window.print()">Imprimir / Guardar PDF</button>
      <button class="btn" onclick="resetAll()">← Nova triagem</button>
      <a href="index.html" class="btn">Voltar ao início</a>
    </div>

    <div class="disclaimer">
      Este resultado é um instrumento de suporte à decisão clínica e não substitui o juízo clínico do psicólogo.<br>
      Pedro Duarte · Psicólogo · Ficha de triagem — uso clínico exclusivo.
    </div>
  </div>`;
}

function resetAll() {
  state.page = 0; state.ident = {}; state.motivo = {}; state.hist = {};
  state.phq9 = new Array(9).fill(null); state.gad7 = new Array(7).fill(null);
  state.trauma = false; state.pcl5 = new Array(20).fill(null);
  state.risco = {}; state.obs = {};
  window.scrollTo(0,0); render();
}

// Init
state.ident.data_tri = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
