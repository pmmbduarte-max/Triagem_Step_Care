<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triagem Psicológica — Centro Clínico da GNR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf9f7; --surface: #ffffff; --surface2: #f3f2ef;
  --text: #1a1917; --text-muted: #6b6a67; --text-hint: #9b9a97;
  --border: rgba(26,25,23,0.11); --border-mid: rgba(26,25,23,0.22);
  --accent: #1a1917;
  --green: #3B6D11; --green-bg: #EAF3DE; --green-border: #C0DD97;
  --amber: #854F0B; --amber-bg: #FAEEDA; --amber-border: #FAC775;
  --red: #A32D2D; --red-bg: #FCEBEB; --red-border: #F7C1C1;
  --blue-bg: #E6F1FB; --blue-text: #042C53; --blue-border: #B5D4F4;
  --teal-bg: #E1F5EE; --teal-text: #085041; --teal-border: #9FE1CB;
  --purple-bg: #EEEDFE; --purple-text: #26215C; --purple-border: #AFA9EC;
  --radius: 10px; --radius-lg: 14px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110; --surface: #1c1c1a; --surface2: #252523;
    --text: #f0ede8; --text-muted: #9b9a97; --text-hint: #6b6a67;
    --border: rgba(240,237,232,0.1); --border-mid: rgba(240,237,232,0.2);
    --accent: #f0ede8;
    --green: #97C459; --green-bg: #173404; --green-border: #3B6D11;
    --amber: #EF9F27; --amber-bg: #412402; --amber-border: #854F0B;
    --red: #E24B4A; --red-bg: #501313; --red-border: #A32D2D;
    --blue-bg: #042C53; --blue-text: #B5D4F4; --blue-border: #185FA5;
    --teal-bg: #04342C; --teal-text: #9FE1CB; --teal-border: #0F6E56;
    --purple-bg: #26215C; --purple-text: #CECBF6; --purple-border: #534AB7;
  }
}

html { font-size: 16px; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 2rem 1rem 5rem;
}
.container { width: 100%; max-width: 720px; }

/* ── Header ── */
.site-header { text-align: center; margin-bottom: 2.5rem; padding-top: 0.5rem; }
.site-header .eyebrow {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-hint); margin-bottom: 10px;
}
.site-header h1 {
  font-family: 'Lora', serif; font-size: 24px; font-weight: 400;
  line-height: 1.35; margin-bottom: 6px;
}
.site-header p { font-size: 13.5px; color: var(--text-muted); line-height: 1.6; }

/* ── Progress ── */
.prog-wrap { margin-bottom: 1.5rem; display: none; }
.prog-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-hint); margin-bottom: 7px; }
.prog-track { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* ── Card ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 2rem;
  animation: up 0.3s cubic-bezier(.4,0,.2,1);
}
@keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── Section header ── */
.sec-hdr {
  display: flex; align-items: center; gap: 11px;
  margin-bottom: 1.25rem; padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.sec-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; flex-shrink: 0; color: var(--text-muted);
}
.sec-title { font-family: 'Lora', serif; font-size: 17px; font-weight: 400; }
.sec-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ── Form ── */
.field { margin-bottom: 1.1rem; }
.field label { display: block; font-size: 12.5px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
.field input[type="text"],
.field input[type="date"],
.field input[type="number"],
.field select,
.field textarea {
  width: 100%; padding: 10px 13px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--surface); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--border-mid);
}
.field textarea { min-height: 80px; resize: vertical; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* ── Scale items ── */
.scale-intro {
  font-size: 13px; color: var(--text-muted); line-height: 1.65;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 11px 14px; margin-bottom: 1rem;
}
.scale-item {
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 13px 15px; margin-bottom: 8px;
}
.scale-q {
  font-size: 13.5px; color: var(--text); margin-bottom: 10px; line-height: 1.5;
}
.scale-q .q-num { color: var(--text-hint); margin-right: 4px; }
.scale-q .q-warn { display: block; font-size: 11px; color: var(--amber); margin-top: 3px; }
.scale-opts { display: flex; gap: 6px; flex-wrap: wrap; }
.scale-opt {
  flex: 1; min-width: 70px; padding: 7px 6px;
  border: 1px solid var(--border); border-radius: 7px;
  background: var(--surface); cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 11.5px;
  color: var(--text-muted); text-align: center; line-height: 1.35;
  transition: all 0.15s;
}
.scale-opt:hover { border-color: var(--border-mid); background: var(--surface2); color: var(--text); }
.scale-opt.sel { border-color: var(--accent); background: var(--accent); color: var(--bg); }

.score-line {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 1rem; padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: 13px; color: var(--text-muted);
}
.score-line strong { font-size: 18px; color: var(--text); }

/* ── Radio / Check ── */
.radio-group { display: flex; flex-direction: column; gap: 7px; }
.radio-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 13px; border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
}
.radio-item:hover { border-color: var(--border-mid); background: var(--surface2); }
.radio-item input { flex-shrink: 0; cursor: pointer; }
.radio-item span { font-size: 13.5px; line-height: 1.4; }

.check-group { display: flex; flex-direction: column; gap: 7px; }
.check-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 13px; border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
}
.check-item:hover { border-color: var(--border-mid); background: var(--surface2); }
.check-item input { flex-shrink: 0; margin-top: 2px; cursor: pointer; }
.check-item span { font-size: 13.5px; line-height: 1.45; }

/* ── Nav ── */
.nav { display: flex; gap: 8px; align-items: center; margin-top: 1.5rem; }
.btn {
  padding: 10px 20px; border-radius: var(--radius);
  border: 1px solid var(--border-mid); background: transparent;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; cursor: pointer; transition: background 0.15s, transform 0.1s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
}
.btn:hover { background: var(--surface2); }
.btn:active { transform: scale(0.97); }
.btn.pri { background: var(--accent); color: var(--bg); border-color: var(--accent); margin-left: auto; }
.btn.pri:hover { opacity: 0.85; background: var(--accent); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Intro cards ── */
.intro-pills { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 1.75rem; }
.pill { font-size: 12px; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); }
.pill.dep { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
.pill.anx { background: var(--teal-bg); color: var(--teal-text); border-color: var(--teal-border); }
.pill.ptr { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-border); }
.pill.rsk { background: var(--amber-bg, #FAEEDA); color: var(--amber, #854F0B); border-color: var(--amber-border, #FAC775); }

/* ── Result ── */
.score-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 1.25rem 0; }
.score-box { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.score-box .lbl { font-size: 10.5px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.score-box .val { font-size: 26px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
.score-box .sev { font-size: 11.5px; color: var(--text-muted); }
.s-green .val { color: var(--green); }
.s-amber .val { color: var(--amber); }
.s-red   .val { color: var(--red); }

.step-badge { border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; margin: 1.25rem 0; }
.step-badge .st-lbl { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.step-badge .st-title { font-family: 'Lora', serif; font-size: 19px; font-weight: 400; margin-bottom: 6px; line-height: 1.35; }
.step-badge .st-desc { font-size: 13px; line-height: 1.6; }
.step-1 { background: var(--green-bg); border: 1px solid var(--green-border); }
.step-1 .st-lbl, .step-1 .st-title { color: var(--green); }
.step-1 .st-desc { color: var(--text-muted); }
.step-2 { background: var(--amber-bg, #FAEEDA); border: 1px solid var(--amber-border, #FAC775); }
.step-2 .st-lbl, .step-2 .st-title { color: var(--amber); }
.step-2 .st-desc { color: var(--text-muted); }
.step-3 { background: var(--red-bg); border: 1px solid var(--red-border); }
.step-3 .st-lbl, .step-3 .st-title { color: var(--red); }
.step-3 .st-desc { color: var(--text-muted); }

.info-box { border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 16px; margin-bottom: 10px; }
.info-box h4 { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.info-box p, .info-box ul { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
.info-box ul { padding-left: 1.2rem; }
.info-box ul li { margin-bottom: 3px; }

.flags-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.flag-tag { font-size: 11.5px; padding: 4px 10px; border-radius: 6px; background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

.disclaimer {
  font-size: 11.5px; color: var(--text-hint);
  border-top: 1px solid var(--border); padding-top: 1.25rem;
  margin-top: 1.5rem; line-height: 1.7; font-style: italic; text-align: center;
}

@media (max-width: 540px) {
  .card { padding: 1.5rem 1.25rem; }
  .row2, .row3 { grid-template-columns: 1fr; }
  .score-grid { grid-template-columns: 1fr; }
  .scale-opts { flex-direction: column; }
  .scale-opt { flex: unset; width: 100%; text-align: left; min-width: unset; }
}

@media print {
  body { padding: 0; background: white; }
  .btn, .nav, .prog-wrap { display: none !important; }
  .card { box-shadow: none; border: 1px solid #ccc; }
  .step-badge, .score-box, .info-box { break-inside: avoid; }
}
</style>
</head>
<body>
<div class="container">

  <header class="site-header">
    <p class="eyebrow">Serviço de Psicologia</p>
    <h1>Centro Clínico da GNR</h1>
    <p>Ficha de Triagem Psicológica — Modelo <em>Stepped Care</em></p>
  </header>

  <div class="prog-wrap" id="prog-wrap">
    <div class="prog-meta"><span id="prog-sec"></span><span id="prog-ct"></span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="app"></div>
</div>

<script>
// ── State
const S = {
  page: 0,
  ident: { data: new Date().toISOString().split('T')[0] },
  motivo: {},
  hist: {},
  phq9: new Array(9).fill(null),
  gad7: new Array(7).fill(null),
  applyPCL: null,
  pcl5: new Array(20).fill(null),
  risco: {},
  obs: {}
};

const PAGES = ['intro','ident','motivo','hist','phq9','gad7','trauma_gate','pcl5','risco','resultado'];
const SEC_LABELS = {
  intro:'Introdução', ident:'Identificação', motivo:'Motivo da consulta',
  hist:'História clínica', phq9:'PHQ-9 · Depressão', gad7:'GAD-7 · Ansiedade',
  trauma_gate:'Rastreio de Trauma', pcl5:'PCL-5 · Trauma/PTSD',
  risco:'Avaliação de Risco', resultado:'Resultado da Triagem'
};

const PHQ9 = [
  "Pouco interesse ou prazer em fazer as coisas?",
  "Sentir-se deprimido(a), sem esperança ou vazio(a)?",
  "Dificuldade em adormecer, manter o sono ou dormir demasiado?",
  "Sentir-se cansado(a) ou com pouca energia?",
  "Apetite diminuído ou excessivo?",
  "Sentir-se mal consigo mesmo(a) — ou sentir que é um fracasso ou que dececionou a família?",
  "Dificuldade em concentrar-se, como ler ou ver televisão?",
  "Mover-se ou falar tão devagar que outras pessoas possam notar? Ou o oposto — estar tão agitado(a) que se mexe mais do que o habitual?",
  "Pensamentos de que seria melhor estar morto(a) ou de se magoar de alguma forma?"
];
const GAD7 = [
  "Sentir-se nervoso(a), ansioso(a) ou em alerta?",
  "Não conseguir parar ou controlar as preocupações?",
  "Preocupar-se demasiado com coisas diferentes?",
  "Dificuldade em relaxar?",
  "Ficar tão agitado(a) que é difícil ficar quieto(a)?",
  "Ficar facilmente irritado(a) ou irritável?",
  "Sentir medo como se algo terrível pudesse acontecer?"
];
const PCL5 = [
  "Memórias repetidas, perturbadoras e indesejadas da experiência stressante?",
  "Sonhos repetidos e perturbadores com a experiência stressante?",
  "De repente sentir ou agir como se a experiência stressante estivesse a acontecer novamente (flashback)?",
  "Sentir-se muito perturbado(a) quando algo lhe faz lembrar a experiência?",
  "Reações físicas intensas quando algo lhe faz lembrar a experiência (coração acelerado, suores, dificuldade em respirar)?",
  "Evitar memórias, pensamentos ou sentimentos relacionados com a experiência?",
  "Evitar pessoas, lugares, conversas, atividades ou situações que lembram a experiência?",
  "Dificuldade em recordar partes importantes da experiência?",
  "Crenças negativas fortes sobre si mesmo(a), outras pessoas ou o mundo?",
  "Culpar-se a si próprio(a) ou a outros pela experiência ou pelo que aconteceu depois?",
  "Sentimentos negativos intensos como medo, horror, raiva, culpa ou vergonha?",
  "Perda de interesse em atividades que costumava gostar?",
  "Sentir-se distante ou afastado(a) das outras pessoas?",
  "Dificuldade em experienciar sentimentos positivos (alegria, amor)?",
  "Comportamento irritável, crises de raiva ou agir de forma agressiva?",
  "Correr demasiados riscos ou fazer coisas que lhe podem causar dano?",
  "Estar em estado de 'alerta máximo', vigilante ou em guarda?",
  "Sentir-se facilmente assustado(a)?",
  "Dificuldade de concentração?",
  "Dificuldade em adormecer ou manter o sono?"
];
const FREQ = [{v:0,l:"Nunca"},{v:1,l:"Vários dias"},{v:2,l:"Mais de\nmetade dos dias"},{v:3,l:"Quase\ntodos os dias"}];
const PCL_F = [{v:0,l:"Nada"},{v:1,l:"Um pouco"},{v:2,l:"Moderada-\nmente"},{v:3,l:"Bastante"},{v:4,l:"Extrema-\nmente"}];

// ── Scoring helpers
function sum(arr) { return arr.reduce((s,v)=>s+(v||0),0); }

function phqSev(s){
  if(s<=4)  return{l:"Sem indicação clínica",c:"green"};
  if(s<=9)  return{l:"Leve",c:"green"};
  if(s<=14) return{l:"Moderada",c:"amber"};
  if(s<=19) return{l:"Moderada-severa",c:"amber"};
  return{l:"Severa",c:"red"};
}
function gadSev(s){
  if(s<=4)  return{l:"Sem indicação clínica",c:"green"};
  if(s<=9)  return{l:"Leve",c:"green"};
  if(s<=14) return{l:"Moderada",c:"amber"};
  return{l:"Severa",c:"red"};
}
function pclSev(s){
  if(s<31)  return{l:"Abaixo do limiar (< 31)",c:"green"};
  if(s<=50) return{l:"Provável PTSD (31–50)",c:"amber"};
  return{l:"PTSD severa provável (> 50)",c:"red"};
}

function calcStep(){
  const phq=sum(S.phq9), gad=sum(S.gad7), pcl=S.applyPCL?sum(S.pcl5):0;
  const r=S.risco;
  const urgent = r.ideacao==='planos'||r.ideacao==='ativo'||r.risco_vida==='sim';
  const high   = phq>=15||gad>=15||(S.applyPCL&&pcl>=33)||r.prev_int==='sim'||r.consumos==='prob';
  const med    = phq>=10||gad>=10||(S.applyPCL&&pcl>=28);
  if(urgent||high) return 3;
  if(med) return 2;
  return 1;
}

function getFlags(){
  const f=[], phq=sum(S.phq9), gad=sum(S.gad7), r=S.risco;
  if((S.phq9[8]||0)>=1) f.push("Item 9 PHQ-9 positivo — pensamentos de autolesão");
  if(phq>=20) f.push("PHQ-9 severo (≥ 20)");
  if(gad>=15) f.push("GAD-7 severo (≥ 15)");
  if(S.applyPCL&&sum(S.pcl5)>=31) f.push("PCL-5 acima do limiar clínico (≥ 31)");
  if(r.ideacao==='planos'||r.ideacao==='ativo') f.push("Ideação suicida com planos ou risco ativo");
  if(r.risco_vida==='sim') f.push("Risco imediato para a vida identificado");
  if(r.prev_int==='sim') f.push("Internamento psiquiátrico prévio");
  if(r.consumos==='prob') f.push("Consumo problemático de substâncias");
  return f;
}

// ── Render
function render(){
  const app=document.getElementById('app');
  const pw=document.getElementById('prog-wrap');
  const p=PAGES[S.page];
  const pct=(S.page/(PAGES.length-1)*100).toFixed(0);
  pw.style.display = p==='intro'?'none':'block';
  document.getElementById('prog-sec').textContent = SEC_LABELS[p]||'';
  document.getElementById('prog-ct').textContent  = (p!=='intro'&&p!=='resultado') ? S.page+' / '+(PAGES.length-2) : '';
  document.getElementById('prog-fill').style.width = pct+'%';
  const fns={intro:rIntro,ident:rIdent,motivo:rMotivo,hist:rHist,phq9:rPHQ9,gad7:rGAD7,trauma_gate:rTrauma,pcl5:rPCL5,risco:rRisco,resultado:rResultado};
  (fns[p]||rIntro)(app);
}

function nav(d){
  const p=PAGES[S.page];
  if(d>0){
    if(p==='trauma_gate'&&!S.applyPCL){ S.page+=2; }
    else { S.page=Math.min(PAGES.length-1,S.page+1); }
  } else {
    if(p==='pcl5'){ S.page-=2; }
    else { S.page=Math.max(0,S.page-1); }
  }
  window.scrollTo(0,0); render();
}

function pick(arr,i,v){ arr[i]=v; render(); }
function toggleArr(obj,key,val){
  if(!obj[key]) obj[key]=[];
  const idx=obj[key].indexOf(val);
  if(idx>=0) obj[key].splice(idx,1); else obj[key].push(val);
}

// ── Pages

function rIntro(app){
  app.innerHTML=`
  <div class="card" style="text-align:center;padding:2rem">
    <div style="font-size:42px;margin-bottom:1.25rem">🛡️</div>
    <h2 style="font-family:'Lora',serif;font-size:20px;font-weight:400;margin-bottom:.75rem;line-height:1.4">
      Ficha de Triagem Psicológica<br><span style="font-size:15px;color:var(--text-muted)">Centro Clínico da GNR — Serviço de Psicologia</span>
    </h2>
    <p style="font-size:13.5px;color:var(--text-muted);line-height:1.75;max-width:500px;margin:0 auto 1.5rem">
      Esta ficha de triagem segue o modelo <em>Stepped Care</em> e integra instrumentos padronizados de avaliação psicológica. 
      O resultado orienta o nível de intervenção recomendado. Todos os dados são estritamente confidenciais.
    </p>
    <div class="intro-pills">
      <span class="pill">Identificação</span>
      <span class="pill">Motivo da consulta</span>
      <span class="pill">História clínica</span>
      <span class="pill dep">PHQ-9</span>

    <div class="info-box" style="background:var(--red-bg);border-color:var(--red-border)">
      <h4 style="color:var(--red)">⚠ Alertas clínicos identificados</h4>
      <div class="flags-list">${flags.map(f=>`<span class="flag-tag">${f}</span>`).join('')}</div>
    </div>`:''}

    <div class="info-box">
      <h4>Recomendações — Nível ${step}</h4>
      <ul>${si.rec.map(r=>`<li>${r}</li>`).join('')}</ul>
    </div>

    ${S.motivo.queixa?`
    <div class="info-box">
      <h4>Queixa principal</h4>
      <p>${S.motivo.queixa}</p>
    </div>`:''}

    ${S.obs.protetores?`
    <div class="info-box">
      <h4>Fatores protetores</h4>
      <p>${S.obs.protetores}</p>
    </div>`:''}

    ${S.obs.notas?`
    <div class="info-box">
      <h4>Notas clínicas</h4>
      <p>${S.obs.notas}</p>
    </div>`:''}

    <div class="info-box">
      <h4>Resumo dos instrumentos</h4>
      <p>PHQ-9: <strong>${phq}/27</strong> (${ps.l}) &nbsp;·&nbsp; GAD-7: <strong>${gad}/21</strong> (${gs.l})${S.applyPCL?` &nbsp;·&nbsp; PCL-5: <strong>${pcl}/80</strong> (${cs.l})`:' &nbsp;·&nbsp; PCL-5: não aplicado'}</p>
    </div>

    <div style="display:flex;justify-content:center;gap:8px;margin-top:1.25rem;flex-wrap:wrap">
      <button class="btn" onclick="window.print()">🖨 Imprimir / PDF</button>
      <button class="btn" onclick="resetAll()">← Nova triagem</button>
    </div>

    <div class="disclaimer">
      Este resultado é um instrumento de suporte à decisão clínica e não substitui o juízo do psicólogo.<br>
      Centro Clínico da GNR — Serviço de Psicologia · Uso clínico exclusivo · Documento confidencial.
    </div>
  </div>`;
}

function resetAll(){
  S.page=0; S.ident={data:new Date().toISOString().split('T')[0]};
  S.motivo={}; S.hist={};
  S.phq9=new Array(9).fill(null); S.gad7=new Array(7).fill(null);
  S.applyPCL=null; S.pcl5=new Array(20).fill(null);
  S.risco={}; S.obs={};
  window.scrollTo(0,0); render();
}

render();
</script>
</body>
</html>
